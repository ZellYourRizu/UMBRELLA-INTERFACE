<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Umbrella Interface</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box}

/* BODY FIX */
body{
    font-family:'Poppins',sans-serif;
    background:#000;
    color:#fff;
}

/* ===== LOADER ===== */
#loader{
    position:fixed;
    inset:0;
    background:#000;
    z-index:9999;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    font-family:'Orbitron';
    color:red;
}

.loader-text{
    margin-bottom:20px;
    animation:blink 1s infinite;
}

.progress-bar{
    width:250px;
    height:6px;
    background:rgba(255,0,0,0.2);
    border-radius:10px;
    overflow:hidden;
}

.progress{
    height:100%;
    width:0%;
    background:red;
}

@keyframes blink{50%{opacity:.5}}

.hide-loader{
    animation:fadeOut 1s forwards;
}

@keyframes fadeOut{
    to{opacity:0;visibility:hidden}
}

/* ===== BACKGROUND FIX ===== */
.background{
    position:fixed;
    inset:0;
    z-index:0;
    overflow:hidden;
}

.bg{
    position:absolute;
    inset:0;
    background:radial-gradient(circle,#220000,#000);
    animation:pulseBg 6s infinite alternate;
}

.overlay{
    position:absolute;
    inset:0;
    background:linear-gradient(120deg,rgba(255,0,0,0.15),transparent);
}

.grid{
    position:absolute;
    inset:0;
    background:
    linear-gradient(rgba(255,0,0,0.07) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,0,0,0.07) 1px,transparent 1px);
    background-size:40px 40px;
}

.scan{
    position:absolute;
    inset:0;
    background:repeating-linear-gradient(to bottom,rgba(255,0,0,0.08) 1px,transparent 4px);
    animation:scan 5s linear infinite;
}

/* GLOW FIX */
.glow{
    position:absolute;
    width:500px;
    height:500px;
    background:radial-gradient(circle,rgba(255,0,0,0.2),transparent);
    filter:blur(100px);
    animation:float 8s infinite alternate;
}

/* ANIMATION */
@keyframes pulseBg{0%{filter:.7}100%{filter:1.3}}
@keyframes scan{from{background-position:0 0}to{background-position:0 120px}}
@keyframes float{from{transform:translate(-100px,-50px)}to{transform:translate(100px,50px)}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}

/* ===== PAGE FIX ===== */
.page{
    position:relative;
    z-index:2;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    transform:scale(1.05);
}

/* muncul setelah loader */
.page.show{
    animation:pageReveal 1.2s ease forwards;
}

@keyframes pageReveal{
    to{opacity:1;transform:scale(1)}
}

/* CONTENT */
.container{
    text-align:center;
    animation:fadeInUp 1s ease;
}

/* LOGO */
.logo{
    width:320px;
    margin-bottom:20px;
    filter:drop-shadow(0 0 20px red);
    transition:.5s;
}

.logo:hover{
    transform:scale(1.05);
}

/* TITLE */
h1{
    font-family:'Orbitron';
    letter-spacing:6px;
    font-size:50px;
    text-shadow:0 0 10px red,0 0 40px rgba(255,0,0,0.7);
}

.subtitle{
    margin-top:10px;
    font-size:13px;
    letter-spacing:3px;
    color:#ff4d4d;
}

/* CARD */
.card{
    margin-top:50px;
    padding:40px;
    width:650px;
    max-width:90%;
    background:rgba(15,0,0,0.8);
    border-radius:25px;
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,0,0,0.25);
    box-shadow:0 0 60px rgba(255,0,0,0.3);
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:30px;
}

/* ITEM */
.item{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
    cursor:pointer;
    padding:15px;
    border-radius:15px;
    transition:.3s;
}

.item:hover{
    transform:translateY(-8px) scale(1.05);
    background:rgba(255,0,0,0.15);
    box-shadow:0 0 20px red;
}

/* ICON */
.icon{
    font-size:32px;
    color:#ff1a1a;
    text-shadow:0 0 10px red;
}

.label{
    font-size:12px;
    letter-spacing:2px;
}

/* RESPONSIVE */
@media(max-width:700px){
    .card{
        grid-template-columns:repeat(2,1fr);
    }
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
    <div class="loader-text">INITIALIZING UMBRELLA SYSTEM...</div>
    <div class="progress-bar">
        <div class="progress" id="progress"></div>
    </div>
</div>

<!-- BACKGROUND -->
<div class="background">
    <div class="bg"></div>
    <div class="overlay"></div>
    <div class="grid"></div>
    <div class="scan"></div>
    <div class="glow"></div>
</div>

<!-- MAIN -->
<div class="page" id="page">

<div class="container">

<img src="https://image2url.com/r2/default/images/1775030108963-42878e89-fae2-428d-955c-b487bdb11992.png" class="logo">

<h1>UMBRELLA</h1>
<div class="subtitle">CREATION OF BIOLOGICAL WEAPONS</div>

<div class="card">

<div class="item"><div class="icon"><i class="fa-solid fa-lightbulb"></i></div><div class="label">INTRODUCTION</div></div>
<div class="item"><div class="icon"><i class="fa-solid fa-users"></i></div><div class="label">MEMBER</div></div>
<div class="item"><div class="icon"><i class="fa-solid fa-clipboard-list"></i></div><div class="label">PROJECT</div></div>

<div class="item" id="founderBtn">
<div class="icon"><i class="fa-solid fa-user-tie"></i></div>
<div class="label">FOUNDER</div>
</div>

<div class="item"><div class="icon"><i class="fa-solid fa-phone"></i></div><div class="label">CONTACT</div></div>
<div class="item"><div class="icon"><i class="fa-solid fa-circle-info"></i></div><div class="label">ABOUT</div></div>

</div>
</div>

</div>

<script>
// LOADER FIX
let p=0;
const progress=document.getElementById("progress");
const loader=document.getElementById("loader");
const page=document.getElementById("page");

let load=setInterval(()=>{
    p+=5;
    progress.style.width=p+"%";

    if(p>=100){
        clearInterval(load);

        setTimeout(()=>{
            loader.classList.add("hide-loader");
            page.classList.add("show"); // tampilkan halaman setelah loader
        },500);
    }
},80);

// REDIRECT
document.getElementById("founderBtn").onclick=()=>{
    window.location.href="https://umbrella-founder-portpolio.pages.dev/";
};
</script>

</body>
</html>
