<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Umbrella Interface</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<!-- ICON LIBRARY -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:'Poppins',sans-serif;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#000;
    overflow:hidden;
    color:#fff;
    animation:fadePage 1.2s ease;
}

@keyframes fadePage{
    from{opacity:0;transform:scale(1.05)}
    to{opacity:1;transform:scale(1)}
}

/* BACKGROUND */
.bg,.overlay,.grid,.scan{
    position:fixed;
    inset:0;
    z-index:0;
}

.bg{
    background:radial-gradient(circle,#220000,#000);
    animation:pulseBg 6s infinite alternate;
}

.overlay{background:linear-gradient(120deg,rgba(255,0,0,0.15),transparent)}

.grid{
    background:
    linear-gradient(rgba(255,0,0,0.07) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,0,0,0.07) 1px,transparent 1px);
    background-size:40px 40px;
}

.scan{
    background:repeating-linear-gradient(to bottom,rgba(255,0,0,0.08) 1px,transparent 4px);
    animation:scan 5s linear infinite;
}

/* GLOW */
body::after{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:radial-gradient(circle,rgba(255,0,0,0.2),transparent);
    filter:blur(100px);
    animation:float 8s infinite alternate;
}

@keyframes pulseBg{0%{filter:.7}100%{filter:1.3}}
@keyframes scan{from{background-position:0 0}to{background-position:0 120px}}
@keyframes float{from{transform:translate(-100px,-50px)}to{transform:translate(100px,50px)}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}

/* CONTENT */
.container{
    position:relative;
    z-index:2;
    text-align:center;
    animation:fadeInUp 1s ease;
}

/* LOGO */
.logo{
    width:350px;
    margin-bottom:20px;
    filter:drop-shadow(0 0 20px red);
    transition:.5s;
}

.logo:hover{
    transform:scale(1.05) rotate(2deg);
    filter:drop-shadow(0 0 40px red);
}

/* TITLE */
h1{
    font-family:'Orbitron';
    letter-spacing:6px;
    font-size:56px;
    text-shadow:0 0 10px red,0 0 40px rgba(255,0,0,0.7);
}

.subtitle{
    margin-top:10px;
    font-size:14px;
    letter-spacing:3px;
    color:#ff4d4d;
}

/* CARD */
.card{
    margin-top:60px;
    padding:50px;
    width:650px;
    background:rgba(15,0,0,0.8);
    border-radius:25px;
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,0,0,0.25);
    box-shadow:0 0 60px rgba(255,0,0,0.3),inset 0 0 30px rgba(255,0,0,0.15);
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:40px;
}

/* ITEM */
.item{
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:12px;
    cursor:pointer;
    padding:15px;
    border-radius:15px;
    overflow:hidden;
    transition:.3s;
}

/* HOVER */
.item:hover{
    transform:translateY(-10px) scale(1.08);
    background:rgba(255,0,0,0.12);
    box-shadow:0 0 30px rgba(255,0,0,0.6);
}

/* ICON */
.icon{
    font-size:38px;
    color:#ff1a1a;
    text-shadow:0 0 15px red;
    transition:.3s;
}

.item:hover .icon{
    transform:scale(1.2);
}

.label{
    font-size:13px;
    letter-spacing:2px;
}

/* RESPONSIVE */
@media(max-width:700px){
    .card{
        width:90%;
        grid-template-columns:repeat(2,1fr);
        padding:30px;
    }
    .logo{width:220px}
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>
<div class="grid"></div>
<div class="scan"></div>

<div class="container">

<img src="https://image2url.com/r2/default/images/1775030108963-42878e89-fae2-428d-955c-b487bdb11992.png" class="logo">

<h1>UMBRELLA</h1>
<div class="subtitle">CREATION OF BIOLOGICAL WEAPONS</div>

<div class="card">

<div class="item">
<div class="icon"><i class="fa-solid fa-lightbulb"></i></div>
<div class="label">INTRODUCTION</div>
</div>

<div class="item">
<div class="icon"><i class="fa-solid fa-users"></i></div>
<div class="label">MEMBER</div>
</div>

<div class="item">
<div class="icon"><i class="fa-solid fa-clipboard-list"></i></div>
<div class="label">PROJECT</div>
</div>

<div class="item">
<div class="icon"><i class="fa-solid fa-user-tie"></i></div>
<div class="label">FOUNDER</div>
</div>

<div class="item">
<div class="icon"><i class="fa-solid fa-phone"></i></div>
<div class="label">CONTACT</div>
</div>

<div class="item">
<div class="icon"><i class="fa-solid fa-circle-info"></i></div>
<div class="label">ABOUT</div>
</div>

</div>
</div>

</body>
</html>
